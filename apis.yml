aid: algolia
url: >-
  https://raw.githubusercontent.com/api-evangelist/algolia/refs/heads/main/apis.yml
apis:
  - aid: algolia:algolia-ab-testing-api
    name: Algolia A/B Testing API
    tags: []
    humanURL: https://www.algolia.com/doc/rest-api/abtesting/
    properties:
      - url: https://www.algolia.com/doc/rest-api/abtesting/
        type: Documentation
    description: >-
      The Algolia A/B Testing API allows developers to easily run experiments on their
      search functionality to test and optimize different configurations. By creating
      multiple versions of their search interface and dividing users into different
      groups, businesses can measure the impact of changes on key metrics such as
      click-through rates and conversion rates.
  - aid: algolia:algolia-advanced-personalization-api
    name: Algolia Advanced Personalization API
    tags:
      - ' '
      - '  '
      - '  Users'
      - ' Personalization'
      - Search
    humanURL: https://www.algolia.com/doc/rest-api/advanced-personalization/
    properties:
      - url: https://www.algolia.com/doc/rest-api/advanced-personalization/
        type: Documentation
      - url: properties/algolia-advanced-personalization-api-openapi.yml
        type: OpenAPI
    description: >-
      Algolia Advanced Personalization API is a powerful tool that allows businesses
      to create personalized search and discovery experiences for their users. By
      leveraging machine learning algorithms, the API analyzes user behavior and preferences
      to deliver highly relevant search results and recommendations in real-time.
      This helps businesses increase user engagement, conversion rates, and overall
      customer satisfaction.
  - aid: algolia:algolia-search-api
    name: Algolia Search API
    tags:
      - Search
    humanURL: https://www.algolia.com/doc/rest-api/search/
    properties:
      - url: https://www.algolia.com/doc/rest-api/search/
        type: Documentation
      - url: properties/algolia-search-api-openapi.yml
        type: OpenAPI
    description: >-
      Algolia Search API is a powerful tool that allows developers to easily integrate
      fast and efficient search functionality into their websites and applications.
      With Algolia, users can quickly search and retrieve relevant results from large
      datasets in real-time.
  - aid: algolia:algolia-analytics-api
    name: Algolia Analytics API
    tags:
      - Search
      - Analytics
      - Insights
    humanURL: https://www.algolia.com/doc/rest-api/analytics/
    properties:
      - url: https://www.algolia.com/doc/rest-api/analytics/
        type: Documentation
      - url: properties/algolia-analytics-api-openapi.yml
        type: OpenAPI
    description: >-
      The Algolia Analytics API is a powerful tool that allows users to track and
      analyze the performance of their search engines in real-time. This API provides
      valuable data on search queries, user engagement, popular search terms, and
      more, helping businesses understand how their users are interacting with their
      website or app.
  - aid: algolia:algolia-crawler-api
    name: Algolia Crawler API
    tags:
      - Search
      - Crawlers
    humanURL: https://www.algolia.com/doc/rest-api/crawler/
    properties:
      - url: https://www.algolia.com/doc/rest-api/crawler/
        type: Documentation
      - url: properties/algolia-crawler-api-openapi.yml
        type: OpenAPI
    description: >-
      Algolia Crawler API is a powerful tool that allows developers to easily scrape
      and index data from websites in order to make it searchable and discoverable
      through Algolia's search engine. The API enables users to specify which pages
      and data they want to crawl, set up custom rules for how the data should be
      processed, and monitor the crawling process in real-time.
  - aid: algolia:algolia-ingestion-api
    name: Algolia Ingestion API
    tags:
      - Search
      - Ingestion
    humanURL: https://www.algolia.com/doc/rest-api/ingestion/
    properties:
      - url: https://www.algolia.com/doc/rest-api/ingestion/
        type: Documentation
      - url: properties/algolia-ingestion-api-openapi.yml
        type: OpenAPI
    description: >-
      The Algolia Ingestion API is a tool that allows developers to easily and efficiently
      transfer data into their Algolia search index. This API provides a simple and
      flexible way to ingest large amounts of data, whether it be product information,
      user profiles, or any other type of content. With the Ingestion API, developers
      can quickly upload and update records in their search index, ensuring that the
      most relevant and up-to-date information is available to users.
  - aid: algolia:algolia-monitoring-api
    name: Algolia Monitoring API
    tags:
      - Search
      - Monitoring
    humanURL: https://www.algolia.com/doc/rest-api/monitoring/
    properties:
      - url: https://www.algolia.com/doc/rest-api/monitoring/
        type: Documentation
      - url: properties/algolia-monitoring-api-openapi.yml
        type: OpenAPI
    description: >-
      The Algolia Monitoring API is a tool that allows users to track and analyze
      the performance of their Algolia search implementations in real-time. This API
      provides key performance indicators such as response times, search latency,
      indexing rates, and user behavior metrics. By monitoring these metrics, users
      can identify potential issues, optimize their search performance, and enhance
      the overall user experience on their applications.
  - aid: algolia:algolia-insights-api
    name: Algolia Insights API
    tags:
      - Insights
      - Search
    humanURL: https://www.algolia.com/doc/rest-api/insights/
    properties:
      - url: https://www.algolia.com/doc/rest-api/insights/
        type: Documentation
      - url: properties/algolia-insights-api-openapi.yml
        type: OpenAPI
    description: >-
      The Insights API lets you collect events related to your search and
      discovery experience. Events represent user interactions with your app or
      website. They unlock powerful features, such as recommendations,
      personalization, smarter search results, and analytics that help you
      optimize your user experience.
  - aid: algolia:algolia-personalization-api
    name: Algolia Personalization API
    tags:
      - Personalization
      - Search
    humanURL: https://www.algolia.com/doc/rest-api/personalization/
    properties:
      - url: https://www.algolia.com/doc/rest-api/personalization/
        type: Documentation
      - url: properties/algolia-personalization-api-openapi.yml
        type: OpenAPI
    description: >-
      The Algolia Personalization API is a powerful tool that allows businesses to
      deliver highly personalized search and recommendation experiences to their users.
      By harnessing machine learning algorithms, the API can analyze user behavior
      and preferences to deliver tailored search results and product recommendations
      in real-time. This leads to increased engagement, conversion rates, and customer
      satisfaction.
  - aid: algolia:algolia-query-suggestions-api
    name: Algolia Query Suggestions API
    tags:
      - Search
      - Querieis
      - Suggestions
    humanURL: https://www.algolia.com/doc/rest-api/query-suggestions/
    properties:
      - url: https://www.algolia.com/doc/rest-api/query-suggestions/
        type: Documentation
      - url: properties/algolia-query-suggestions-api-openapi.yml
        type: OpenAPI
    description: >-
      The Algolia Query Suggestions API is a powerful tool that allows developers
      to enhance search functionality on their websites or applications. By utilizing
      advanced algorithms, the API generates real-time suggestions as users type in
      the search bar, helping them quickly find relevant content or products. These
      suggestions are based on popular search queries, user behavior, and contextual
      relevance, improving search accuracy and user experience.
  - aid: algolia:algolia-recommend-api
    name: Algolia Recommend API
    tags:
      - Search
      - Recommendations
    humanURL: https://www.algolia.com/doc/rest-api/recommend/
    properties:
      - url: https://www.algolia.com/doc/rest-api/recommend/
        type: Documentation
      - url: properties/algolia-recommend-api-openapi.yml
        type: OpenAPI
    description: >-
      Algolia Recommend API is a powerful tool that leverages machine learning algorithms
      to provide personalized recommendations to users based on their behavior and
      preferences. By analyzing user interactions, search history, and other data
      points, the API can suggest relevant products, content, or services to drive
      engagement and increase conversion rates.

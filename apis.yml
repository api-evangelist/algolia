aid: algolia
url: >-
  https://raw.githubusercontent.com/api-evangelist/algolia/refs/heads/main/apis.yml
modified: '2026-04-19'
name: Algolia
description: >-
  Algolia is a hosted search and discovery platform offering full-text,
  numerical, and faceted search capable of delivering real-time results from
  the first keystroke. Algolia's API powers billions of queries for thousands
  of companies every month, delivering relevant results in under 100ms anywhere
  in the world. The platform combines traditional keyword search with AI-powered
  NeuralSearch (vector + keyword hybrid search) using large language models for
  semantic understanding. Algolia's product suite includes search, analytics,
  recommendations, personalization, A/B testing, monitoring, ingestion, and
  agentic AI capabilities through Agent Studio. The company serves e-commerce,
  media, SaaS, and enterprise customers with SDKs across all major languages.
apis:
  - aid: algolia:algolia-search-api
    name: Algolia Search API
    description: >-
      Algolia Search API is a powerful tool that allows developers to integrate
      fast and efficient search functionality into their websites and
      applications. With Algolia, users can quickly search and retrieve relevant
      results from large datasets in real-time. The API features advanced search
      capabilities such as typo-tolerance, synonym recognition, geo-search, and
      AI-powered NeuralSearch combining vector and keyword search for semantic
      understanding beyond literal keyword matches.
    humanURL: https://www.algolia.com/doc/rest-api/search/
    baseURL: https://{appId}.algolia.net
    tags:
      - Search
      - Full-Text Search
      - Vector Search
      - NeuralSearch
    properties:
      - type: Documentation
        url: https://www.algolia.com/doc/rest-api/search/
      - type: OpenAPI
        url: openapi/algolia-search-api-openapi.yml
  - aid: algolia:algolia-analytics-api
    name: Algolia Analytics API
    description: >-
      The Algolia Analytics API allows users to track and analyze the
      performance of their Algolia search implementations in real-time. This
      API provides key performance indicators such as response times, search
      latency, indexing rates, popular search terms, click-through rates, and
      user behavior metrics. By monitoring these metrics, users can identify
      potential issues, optimize search performance, and enhance the overall
      user experience.
    humanURL: https://www.algolia.com/doc/rest-api/analytics/
    baseURL: https://analytics.algolia.com
    tags:
      - Analytics
      - Insights
      - Search
      - Metrics
    properties:
      - type: Documentation
        url: https://www.algolia.com/doc/rest-api/analytics/
      - type: OpenAPI
        url: openapi/algolia-analytics-api-openapi.yml
  - aid: algolia:algolia-insights-api
    name: Algolia Insights API
    description: >-
      The Insights API lets you collect events related to your search and
      discovery experience. Events represent user interactions with your app or
      website. They unlock powerful features, such as recommendations,
      personalization, smarter search results, and analytics that help you
      optimize your user experience.
    humanURL: https://www.algolia.com/doc/rest-api/insights/
    baseURL: https://insights.algolia.io
    tags:
      - Insights
      - Events
      - Search
      - User Behavior
    properties:
      - type: Documentation
        url: https://www.algolia.com/doc/rest-api/insights/
      - type: OpenAPI
        url: openapi/algolia-insights-api-openapi.yml
  - aid: algolia:algolia-recommend-api
    name: Algolia Recommend API
    description: >-
      Algolia Recommend API leverages machine learning algorithms to provide
      personalized recommendations to users based on their behavior and
      preferences. By analyzing user interactions, search history, and other
      data points, the API can suggest relevant products, content, or services
      to drive engagement and increase conversion rates.
    humanURL: https://www.algolia.com/doc/rest-api/recommend/
    baseURL: https://{appId}.algolia.net
    tags:
      - Recommendations
      - Machine Learning
      - Search
      - Personalization
    properties:
      - type: Documentation
        url: https://www.algolia.com/doc/rest-api/recommend/
      - type: OpenAPI
        url: openapi/algolia-recommend-api-openapi.yml
  - aid: algolia:algolia-personalization-api
    name: Algolia Personalization API
    description: >-
      The Algolia Personalization API allows businesses to deliver highly
      personalized search and recommendation experiences to their users. By
      harnessing machine learning algorithms, the API analyzes user behavior
      and preferences to deliver tailored search results and product
      recommendations in real-time, leading to increased engagement, conversion
      rates, and customer satisfaction.
    humanURL: https://www.algolia.com/doc/rest-api/personalization/
    baseURL: https://personalization.algolia.com
    tags:
      - Personalization
      - Search
      - Machine Learning
    properties:
      - type: Documentation
        url: https://www.algolia.com/doc/rest-api/personalization/
      - type: OpenAPI
        url: openapi/algolia-personalization-api-openapi.yml
  - aid: algolia:algolia-advanced-personalization-api
    name: Algolia Advanced Personalization API
    description: >-
      Algolia Advanced Personalization API is a powerful tool that allows
      businesses to create personalized search and discovery experiences for
      their users. By leveraging machine learning algorithms, the API analyzes
      user behavior and preferences to deliver highly relevant search results
      and recommendations in real-time.
    humanURL: https://www.algolia.com/doc/rest-api/advanced-personalization/
    baseURL: https://personalization.algolia.com
    tags:
      - Personalization
      - Search
      - Users
      - Machine Learning
    properties:
      - type: Documentation
        url: https://www.algolia.com/doc/rest-api/advanced-personalization/
      - type: OpenAPI
        url: openapi/algolia-advanced-personalization-api-openapi.yml
  - aid: algolia:algolia-query-suggestions-api
    name: Algolia Query Suggestions API
    description: >-
      The Algolia Query Suggestions API allows developers to enhance search
      functionality by generating real-time suggestions as users type in the
      search bar, helping them quickly find relevant content or products. These
      suggestions are based on popular search queries, user behavior, and
      contextual relevance, improving search accuracy and user experience.
    humanURL: https://www.algolia.com/doc/rest-api/query-suggestions/
    baseURL: https://{appId}.algolia.net
    tags:
      - Search
      - Suggestions
      - Autocomplete
    properties:
      - type: Documentation
        url: https://www.algolia.com/doc/rest-api/query-suggestions/
      - type: OpenAPI
        url: openapi/algolia-query-suggestions-api-openapi.yml
  - aid: algolia:algolia-ab-testing-api
    name: Algolia A/B Testing API
    description: >-
      The Algolia A/B Testing API allows developers to easily run experiments
      on their search functionality to test and optimize different
      configurations. By creating multiple versions of their search interface
      and dividing users into different groups, businesses can measure the
      impact of changes on key metrics such as click-through rates and
      conversion rates.
    humanURL: https://www.algolia.com/doc/rest-api/abtesting/
    baseURL: https://analytics.algolia.com
    tags:
      - A/B Testing
      - Experimentation
      - Search
      - Optimization
    properties:
      - type: Documentation
        url: https://www.algolia.com/doc/rest-api/abtesting/
  - aid: algolia:algolia-monitoring-api
    name: Algolia Monitoring API
    description: >-
      The Algolia Monitoring API allows users to track and analyze the
      performance of their Algolia search implementations in real-time. This
      API provides key performance indicators such as response times, search
      latency, indexing rates, and user behavior metrics to identify potential
      issues and optimize search performance.
    humanURL: https://www.algolia.com/doc/rest-api/monitoring/
    baseURL: https://status.algolia.com
    tags:
      - Monitoring
      - Status
      - Performance
      - Search
    properties:
      - type: Documentation
        url: https://www.algolia.com/doc/rest-api/monitoring/
      - type: OpenAPI
        url: openapi/algolia-monitoring-api-openapi.yml
  - aid: algolia:algolia-ingestion-api
    name: Algolia Ingestion API
    description: >-
      The Algolia Ingestion API allows developers to efficiently transfer data
      into their Algolia search index. This API provides a flexible way to
      ingest large amounts of data, whether it be product information, user
      profiles, or any other type of content. With the Ingestion API, developers
      can quickly upload and update records in their search index, ensuring the
      most relevant and up-to-date information is available to users.
    humanURL: https://www.algolia.com/doc/rest-api/ingestion/
    baseURL: https://data.us.algolia.com
    tags:
      - Ingestion
      - Data
      - Search
      - ETL
    properties:
      - type: Documentation
        url: https://www.algolia.com/doc/rest-api/ingestion/
      - type: OpenAPI
        url: openapi/algolia-ingestion-api-openapi.yml
  - aid: algolia:algolia-crawler-api
    name: Algolia Crawler API
    description: >-
      Algolia Crawler API allows developers to scrape and index data from
      websites in order to make it searchable and discoverable through
      Algolia's search engine. The API enables users to specify which pages and
      data they want to crawl, set up custom rules for how the data should be
      processed, and monitor the crawling process in real-time.
    humanURL: https://www.algolia.com/doc/rest-api/crawler/
    baseURL: https://crawler.algolia.com
    tags:
      - Crawlers
      - Web Scraping
      - Search
      - Indexing
    properties:
      - type: Documentation
        url: https://www.algolia.com/doc/rest-api/crawler/
      - type: OpenAPI
        url: openapi/algolia-crawler-api-openapi.yml
